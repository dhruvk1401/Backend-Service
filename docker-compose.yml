version: "3.8"

services:
  mongo:
    image: mongo:latest
    container_name: "mongoDB"
    ports:
      - "27017:27017"
    networks:
      - my-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - my-network

networks:
  my-network:
    external: false
